name: CI/CD Pipeline Example

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # This action checks out your repository under $GITHUB_WORKSPACE
        uses: actions/checkout@v4
        [actions/checkout@v4](https://github.com/actions/checkout)

      - name: Set up Node.js
        # This action installs the specified Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # Runs a single command using the runners shell
        run: npm install

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

  # You can add further jobs for deployment to different environments (staging, production)
  # For more advanced examples involving deployment to Kubernetes or AWS, see the
  # [GitHub Actions documentation](https://docs.github.com/actions).
