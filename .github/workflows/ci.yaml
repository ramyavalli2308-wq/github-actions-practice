# .github/workflows/repo-events.yml
name: Repo Events
on:
  push:
    branches:
      - main
      - 'release/*'
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]
  create:        # branch or tag created
  delete:        # branch or tag deleted
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: dev
  schedule:
    - cron: "0 0 * * *"  # daily at 00:00 UTC

jobs:
  build_and_test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch/Ref: ${{ github.ref }}"
          echo "Manual env: ${{ inputs.environment }}"
      - run: npm ci && npm test

  housekeeping:
    if: github.event_name == 'create' || github.event_name == 'delete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Branch/Tag ${GITHUB_REF} was ${{ github.event_name }}d"

  nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Nightly job running with cron"
